name: Validate content

# Safety net for anything that bypasses the wiki editor's built-in checks
# (direct git pushes, bulk edits, etc.). Catches broken pages BEFORE they reach
# production and break the Vercel deploy.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fast, per-file check with plain-English errors. Fails fast and tells you
      # exactly which file and line is broken.
      - name: Validate all MDX content
        run: npm run validate:content

      # Full Vercel-parity build. This is the same command Vercel runs, so if it
      # passes here it will deploy. Catches anything the content check can't.
      - name: Production build
        run: npm run build
